<div id="gallery-overlay" onclick="closeLightbox(event)">
  <img id="overlay-img" src="">
  <div class="nav-hint">USE ARROWS TO NAVIGATE • SCROLL TO ZOOM • ESC TO CLOSE</div>
</div>

<script>
  let currentIndex = 0;
  const images = Array.from(document.querySelectorAll('.lab-img')).map(img => img.src);
  const overlay = document.getElementById('gallery-overlay');
  const overlayImg = document.getElementById('overlay-img');
  let zoomLevel = 1;

  function openLightbox(index) {
    currentIndex = index;
    zoomLevel = 1; 
    updateImage();
    overlay.style.display = 'flex';
    document.body.style.overflow = 'hidden'; 
  }

  function closeLightbox(event) {
    
    if (event.target === overlay) {
      overlay.style.display = 'none';
      document.body.style.overflow = 'auto';
    }
  }

  function updateImage() {
    overlayImg.src = images[currentIndex];
    overlayImg.style.transform = `scale(${zoomLevel})`;
  }

  
  document.addEventListener('keydown', (e) => {
    if (overlay.style.display === 'flex') {
      if (e.key === "ArrowRight") {
        currentIndex = (currentIndex + 1) % images.length;
        zoomLevel = 1;
        updateImage();
      } else if (e.key === "ArrowLeft") {
        currentIndex = (currentIndex - 1 + images.length) % images.length;
        zoomLevel = 1;
        updateImage();
      } else if (e.key === "Escape") {
        overlay.style.display = 'none';
        document.body.style.overflow = 'auto';
      }
    }
  });

  
  overlay.addEventListener('wheel', (e) => {
    if (overlay.style.display === 'flex') {
      e.preventDefault();
      const delta = e.deltaY * -0.001;
      zoomLevel = Math.min(Math.max(0.5, zoomLevel + delta), 3); 
      overlayImg.style.transform = `scale(${zoomLevel})`;
    }
  }, { passive: false });
</script>
