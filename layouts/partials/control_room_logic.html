<style>
  .lab-interface {
    position: relative;
    width: 100%;
    max-width: 1000px; /* Adjust to match your theme's width */
    margin: 20px auto;
    line-height: 0;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  /* Image Layering */
  .lab-base-img {
    width: 100%;
    height: auto;
    display: block;
    transition: opacity 0.5s ease-in-out;
  }

  /* Theme Switching Logic */
  .img-dark { position: absolute; top: 0; left: 0; opacity: 0; }
  
  /* This targets the standard Hugo-Coder dark mode class */
  body.colorscheme-dark .img-dark { opacity: 1; }
  /* If your theme uses 'dark-mode' class instead, keep this: */
  body.dark-mode .img-dark { opacity: 1; }

  /* SVG Interaction Layer */
  .lab-overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    z-index: 10;
  }

  .hitbox {
    fill: transparent;
    stroke: transparent;
    /* Remove !important from here so your inline path styles work */
    transition: all 0.3s ease;
    cursor: pointer;
    vector-effect: non-scaling-stroke; /* This keeps the line thin even when scaled */
  }
  /* Add this to your <style> section */
  .hitbox[onclick*="toggleDarkMode"]:hover {
    fill: rgba(255, 255, 0, 0.2); /* Yellowish glow for a lightswitch */
    stroke: #ffff00;
    filter: drop-shadow(0 0 8px #ffff00);
 }

  .hitbox:hover {
    fill: rgba(0, 255, 255, 0.15);
    stroke: #00ffff;
    filter: drop-shadow(0 0 10px #00ffff);
  }

  #hud-display {
    position: absolute;
    top: 15px;
    right: 15px;
    background: rgba(0, 20, 20, 0.85);
    border-left: 3px solid #00ffff;
    padding: 15px 20px;
    color: #00ffff;
    font-family: monospace;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 200; /* Higher z-index just in case */

    /* Force the layout to stack and have height */
    display: flex !important;
    flex-direction: column !important;
    gap: 8px !important;
    line-height: 1.5 !important; /* Forces height back into the box */
  }

  #hud-title {
    font-size: 24px !important; /* Large and clear */
    font-weight: bold !important;
    letter-spacing: 1px;
    display: block !important;
  }

  #hud-sub {
    font-size: 16px !important; /* Clear sub-text */
    color: rgba(0, 255, 255, 0.9) !important;
    display: block !important;
  }

  /* The 'Ping' animation */
@keyframes revealPing {
  0% { fill: rgba(0, 255, 255, 0); stroke: rgba(0, 255, 255, 0); }
  50% { fill: rgba(0, 255, 255, 0.3); stroke: rgba(0, 255, 255, 1); }
  100% { fill: rgba(0, 255, 255, 0); stroke: rgba(0, 255, 255, 0); }
}

/* This class will be added via Javascript */
.reveal-active {
  animation: revealPing 1.5s ease-in-out;
}
</style>

<script>
  const hud = document.getElementById('hud-display');
  const hTitle = document.getElementById('hud-title');
  const hSub = document.getElementById('hud-sub');

  function showHud(t, s) {
    hTitle.innerText = t;
    hSub.innerText = s;
    hud.style.opacity = '1';
  }
  
  function hideHud() { hud.style.opacity = '0'; }

  // LIGHT SWITCH: Keep this simple function
  function toggleDarkMode() {
    const isDark = document.body.classList.contains('colorscheme-dark') || 
                   document.body.classList.contains('dark-mode');
    document.body.classList.toggle('colorscheme-dark', !isDark);
  }

  // BLOG LINKS: This listens for clicks on paths with a "data-link"
  document.querySelector('.lab-overlay').addEventListener('click', function(e) {
    const target = e.target.closest('.hitbox');
    if (!target) return;

    const link = target.getAttribute('data-link');
    
    if (link === "#") {
      showHud('ACCESS DENIED', 'DATA LOG OFFLINE');
      setTimeout(hideHud, 1500);
    } else if (link) {
      window.location.href = link;
    }
  });

  function triggerScan() {
    const hitboxes = document.querySelectorAll('.hitbox');
    const btn = document.getElementById('scan-btn');
    btn.disabled = true;
    btn.innerText = "Scanning...";

    hitboxes.forEach(path => {
      path.classList.add('reveal-active');
      setTimeout(() => {
        path.classList.remove('reveal-active');
        btn.disabled = false;
        btn.innerText = "Execute Area Scan";
      }, 1500);
    });
  }
</script>
