<style>
  .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
  .gallery-item img { width: 100%; height: 250px; object-fit: cover; border-radius: 8px; cursor: pointer; transition: 0.2s; }
  .gallery-item img:hover { filter: brightness(1.1); }
  
  #gallery-overlay {
    display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%;
    background-color: rgba(0,0,0,0.95); align-items: center; justify-content: center;
  }
  #gallery-overlay img { max-width: 90%; max-height: 90%; border-radius: 4px; transition: transform 0.1s ease-out; }
  
  .nav-hint { position: absolute; bottom: 20px; color: #666; font-family: monospace; font-size: 12px; }
</style>

<div class="gallery-grid">
  {{ $images := .Page.Resources.ByType "image" }}
  {{ range $index, $element := $images }}
    <div class="gallery-item">
      <img src="{{ .RelPermalink }}" onclick="openLightbox({{ $index }})" alt="Project Image" class="lab-img">
    </div>
  {{ end }}
</div>

<div id="gallery-overlay" onclick="closeLightbox(event)">
  <img id="overlay-img" src="">
  <div class="nav-hint">USE ARROWS TO NAVIGATE • SCROLL TO ZOOM • ESC TO CLOSE</div>
</div>

<script>
  let currentIndex = 0;
  const images = Array.from(document.querySelectorAll('.lab-img')).map(img => img.src);
  const overlay = document.getElementById('gallery-overlay');
  const overlayImg = document.getElementById('overlay-img');
  let zoomLevel = 1;

  function openLightbox(index) {
    currentIndex = index;
    zoomLevel = 1; // Reset zoom
    updateImage();
    overlay.style.display = 'flex';
    document.body.style.overflow = 'hidden'; // Stop background scrolling
  }

  function closeLightbox(event) {
    // Only close if clicking the background, not the image itself
    if (event.target === overlay) {
      overlay.style.display = 'none';
      document.body.style.overflow = 'auto';
    }
  }

  function updateImage() {
    overlayImg.src = images[currentIndex];
    overlayImg.style.transform = `scale(${zoomLevel})`;
  }

  // Keyboard Navigation (Arrows & Escape)
  document.addEventListener('keydown', (e) => {
    if (overlay.style.display === 'flex') {
      if (e.key === "ArrowRight") {
        currentIndex = (currentIndex + 1) % images.length;
        zoomLevel = 1;
        updateImage();
      } else if (e.key === "ArrowLeft") {
        currentIndex = (currentIndex - 1 + images.length) % images.length;
        zoomLevel = 1;
        updateImage();
      } else if (e.key === "Escape") {
        overlay.style.display = 'none';
        document.body.style.overflow = 'auto';
      }
    }
  });

  // Scroll Wheel Zoom
  overlay.addEventListener('wheel', (e) => {
    if (overlay.style.display === 'flex') {
      e.preventDefault();
      const delta = e.deltaY * -0.001;
      zoomLevel = Math.min(Math.max(0.5, zoomLevel + delta), 3); // Limit zoom between 0.5x and 3x
      overlayImg.style.transform = `scale(${zoomLevel})`;
    }
  }, { passive: false });
</script>
